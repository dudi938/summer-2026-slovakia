<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>מפת אטרקציות - חופשה בסלובקיה 2026</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .map-page #map {
            display: block !important;
            height: calc(100vh - 60px);
            width: 100%;
            z-index: 1;
        }
        .map-page main {
            padding: 0;
            max-width: 100%;
        }
        .map-controls {
            position: absolute;
            top: 70px;
            right: 10px;
            z-index: 1000;
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            padding: 12px;
            max-width: 280px;
        }
        .map-controls .filter-chips {
            flex-wrap: wrap;
            gap: 4px;
        }
        .map-controls .chip {
            font-size: 0.75rem;
            padding: 4px 8px;
        }
        .map-legend {
            position: absolute;
            bottom: 30px;
            right: 10px;
            z-index: 1000;
            background: white;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            padding: 10px 14px;
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            margin: 4px 0;
            font-size: 0.8rem;
        }
        .legend-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        .back-btn {
            position: absolute;
            top: 70px;
            left: 10px;
            z-index: 1000;
            background: white;
            border: none;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            padding: 10px 16px;
            cursor: pointer;
            font-family: var(--font-family);
            font-weight: 600;
        }
    </style>
</head>
<body class="map-page">
    <header class="site-header">
        <nav class="navbar">
            <a href="index.html" class="logo">🇸🇰 חופשה בסלובקיה 2026</a>
            <button class="menu-toggle" onclick="toggleMobileMenu()">☰</button>
            <ul class="nav-links">
                <li><a href="index.html">בית</a></li>
                <li><a href="map.html" class="active">מפה</a></li>
                <li class="dropdown">
                    <a href="#">אזורים ▾</a>
                    <ul class="dropdown-menu">
                        <li><a href="areas/high-tatras.html">הרי הטטרה</a></li>
                        <li><a href="areas/bratislava.html">ברטיסלבה</a></li>
                        <li><a href="areas/vienna.html">וינה</a></li>
                        <li><a href="areas/budapest.html">בודפשט</a></li>
                        <li><a href="areas/czech.html">צ'כיה</a></li>
                    </ul>
                </li>
                <li class="dropdown">
                    <a href="#">קטגוריות ▾</a>
                    <ul class="dropdown-menu">
                        <li><a href="categories/water-sports.html">ספורט מים</a></li>
                        <li><a href="categories/adventure.html">הרפתקאות</a></li>
                        <li><a href="categories/nature.html">טבע ונופים</a></li>
                        <li><a href="categories/cycling.html">אופניים</a></li>
                    </ul>
                </li>
                <li><a href="shabbat.html">שבת וכשרות</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <a href="index.html" class="back-btn">→ חזרה לרשימה</a>
        
        <div class="map-controls">
            <div class="filter-chips">
                <button class="chip active" onclick="filterByCategory('')">הכל</button>
                <button class="chip" onclick="filterByCategory('water-sports')">🚣 מים</button>
                <button class="chip" onclick="filterByCategory('adventure')">🧗 הרפתקה</button>
                <button class="chip" onclick="filterByCategory('nature')">🌲 טבע</button>
                <button class="chip" onclick="filterByCategory('cycling')">🚴 אופניים</button>
                <button class="chip" onclick="filterByCategory('shabbat')">✡️ שבת</button>
            </div>
        </div>

        <div class="map-legend">
            <div class="legend-item"><span class="legend-dot" style="background:#2196F3"></span> ספורט מים</div>
            <div class="legend-item"><span class="legend-dot" style="background:#F44336"></span> הרפתקאות</div>
            <div class="legend-item"><span class="legend-dot" style="background:#4CAF50"></span> טבע</div>
            <div class="legend-item"><span class="legend-dot" style="background:#FF9800"></span> אופניים</div>
            <div class="legend-item"><span class="legend-dot" style="background:#9C27B0"></span> שבת</div>
            <div class="legend-item"><span class="legend-dot" style="background:#E91E63"></span> משפחה</div>
        </div>

        <div id="map" class="map-container"></div>
    </main>

    <div id="toast" class="toast"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="js/app.js"></script>
    <script>
        // Auto-show map on this page
        document.addEventListener('DOMContentLoaded', function() {
            setTimeout(function() {
                if (typeof initMap === 'function' && !map) {
                    initMap();
                    renderMarkers();
                }
            }, 500);
        });
    </script>
</body>
</html>
